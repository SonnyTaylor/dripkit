# dripkit starship — Dracula Neon
# Neon icons with vibrant colors

format = """
[ ]({{accent}})$directory$git_branch$git_status$cmd_duration\
$line_break\
$character"""

[directory]
style = "bold {{blue}}"
format = "[$path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = " "
"Downloads" = " "
"Music" = " "
"Pictures" = " "
"Code" = " "

[git_branch]
symbol = ""
style = "{{pink}}"
format = "[ $symbol $branch]($style)"

[git_status]
style = "bold {{yellow}}"
format = "[ $all_status$ahead_behind]($style)"
modified = "✦"
staged = "+"
untracked = "?"
deleted = "✘"
renamed = "»"
conflicted = ""
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
stashed = "≡"

[cmd_duration]
min_time = 500
style = "{{subtext0}}"
format = " [$duration]($style)"

[character]
success_symbol = "[⟩](bold {{green}})"
error_symbol = "[⟩](bold {{red}})"
