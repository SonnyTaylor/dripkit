# dripkit starship — Solarized Dark Unix Traditional
# Classic user@host:path (branch) format

format = """
$username[@]({{fg}})$hostname[: ]({{fg}})$directory$git_branch\
$line_break\
$character"""

[username]
show_always = true
style_user = "bold {{yellow}}"
style_root = "bold {{red}}"
format = "[$user]($style_user)"

[hostname]
ssh_only = false
style = "bold {{yellow}}"
format = "[$hostname]($style)"

[directory]
style = "bold {{blue}}"
format = "[$path]($style)"
truncation_length = 4
truncation_symbol = "…/"

[git_branch]
symbol = ""
style = "{{green}}"
format = "[ ($branch)]($style)"

[character]
success_symbol = "[\\$]({{fg}})"
error_symbol = "[\\$](bold {{red}})"
