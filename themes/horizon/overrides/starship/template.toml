# dripkit starship ‚ÄĒ Horizon Warm Gradient
# Warm directory to cool git, mimicking sunset-to-twilight

format = """
$directory$git_branch$git_status\
$line_break\
$character"""

[directory]
style = "bold {{peach}}"
format = "[$path ]($style)"
truncation_length = 3
truncation_symbol = "‚Ä¶/"

[directory.substitutions]
"Documents" = "ÔĄē "
"Downloads" = "ÔĄē "
"Music" = "ÔĄē "
"Pictures" = "ÔĄē "
"Code" = "ÔĄ° "

[git_branch]
symbol = "Óú•"
style = "{{teal}}"
format = "[$symbol $branch]($style)"

[git_status]
style = "{{yellow}}"
format = "[ $all_status$ahead_behind]($style)"
modified = "~"
staged = "+"
untracked = "?"
deleted = "‚úė"
renamed = "¬Ľ"
conflicted = ""
ahead = "‚á°${count}"
behind = "‚á£${count}"
diverged = "‚áē‚á°${ahead_count}‚á£${behind_count}"
stashed = "‚Č°"

[character]
success_symbol = "[‚ĚĮ](bold {{green}})"
error_symbol = "[‚ĚĮ](bold {{red}})"
