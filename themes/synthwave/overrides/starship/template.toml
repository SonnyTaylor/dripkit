# dripkit starship — Synthwave Glitch Neon
# Bright one-liner with angle brackets and neon colors

format = """
$username$directory$git_branch $character"""

[username]
show_always = true
style_user = "bold {{pink}}"
style_root = "bold {{red}}"
format = "[⟨$user⟩]($style_user) "

[directory]
style = "bold {{teal}}"
format = "[$path]($style)"
truncation_length = 2
truncation_symbol = "…/"

[git_branch]
symbol = ""
style = "bold {{mauve}}"
format = "[ \\[$branch\\]]($style)"

[character]
success_symbol = "[>>](bold {{accent}})"
error_symbol = "[>>](bold {{red}})"
