# dripkit starship ÔÇö One Dark IDE Status
# Clean one-line developer prompt, like a code editor breadcrumb

format = """
$directory$git_branch$cmd_duration $character"""

[directory]
style = "bold {{blue}}"
format = "[$path]($style)"
truncation_length = 3
truncation_symbol = "ÔÇª/"

[directory.substitutions]
"Documents" = "´äò "
"Downloads" = "´äò "
"Music" = "´äò "
"Pictures" = "´äò "
"Code" = "´äí "

[git_branch]
symbol = "¯éá"
style = "{{mauve}}"
format = "[ $symbol $branch]($style)"

[cmd_duration]
min_time = 500
style = "{{subtext0}}"
format = " [$duration]($style)"

[character]
success_symbol = "[╬╗](bold {{green}})"
error_symbol = "[╬╗](bold {{red}})"
