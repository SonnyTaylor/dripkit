# dripkit hyprlock theme

background {
    path = {{wallpaper}}
    blur_passes = 3
    blur_size = 8
    contrast = 0.9
    brightness = 0.7
    vibrancy = 0.2
}

input-field {
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgba({{accent_rgb}}ff)
    inner_color = rgba({{surface0_rgb}}ff)
    font_color = rgba({{fg_rgb}}ff)
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    check_color = rgba({{green_rgb}}ff)
    fail_color = rgba({{red_rgb}}ff)
    fail_text = <i>$FAIL</i>
    capslock_color = rgba({{yellow_rgb}}ff)
    position = 0, -20
    halign = center
    valign = center
    rounding = 12
}

label {
    text = $TIME
    color = rgba({{fg_rgb}}ff)
    font_size = 72
    font_family = {{font}}
    position = 0, 100
    halign = center
    valign = center
}

label {
    text = cmd[update:60000] date +"%A, %B %d"
    color = rgba({{subtext0_rgb}}ff)
    font_size = 18
    font_family = {{font}}
    position = 0, 30
    halign = center
    valign = center
}
