# dripkit starship prompt theme

format = """
[]({{teal}})\
$os\
[](fg:{{teal}} bg:{{surface1}})\
$directory\
[](fg:{{surface1}} bg:{{peach}})\
$git_branch\
$git_status\
[](fg:{{peach}})\
$cmd_duration\
$line_break\
$character"""

[os]
disabled = false
style = "bg:{{teal}} fg:{{bg}}"

[os.symbols]
Arch = " "

[directory]
style = "bg:{{surface1}} fg:{{fg}}"
format = "[  $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = " "
"Downloads" = " "
"Music" = " "
"Pictures" = " "
"Code" = " "

[git_branch]
symbol = ""
style = "bg:{{peach}} fg:{{bg}}"
format = "[ $symbol $branch ]($style)"

[git_status]
style = "bg:{{peach}} fg:{{bg}}"
format = "[$all_status$ahead_behind ]($style)"
conflicted = ""
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?"
stashed = "≡"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"

[cmd_duration]
min_time = 500
style = "{{subtext0}}"
format = " [ $duration]($style)"

[character]
success_symbol = "[❯](bold {{green}})"
error_symbol = "[❯](bold {{red}})"
