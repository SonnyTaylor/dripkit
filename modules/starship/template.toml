# dripkit starship prompt theme

format = """
[]({{accent}})\
$os\
[](bg:{{blue}} fg:{{accent}})\
$directory\
[](fg:{{blue}} bg:{{mauve}})\
$git_branch\
$git_status\
[](fg:{{mauve}} bg:{{surface0}})\
$cmd_duration\
[](fg:{{surface0}})\
$line_break\
$character"""

[os]
disabled = false
style = "bg:{{accent}} fg:{{bg}}"

[os.symbols]
Arch = " "

[directory]
style = "bg:{{blue}} fg:{{bg}}"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[git_branch]
symbol = " "
style = "bg:{{mauve}} fg:{{bg}}"
format = "[ $symbol$branch ]($style)"

[git_status]
style = "bg:{{mauve}} fg:{{bg}}"
format = "[$all_status$ahead_behind ]($style)"

[cmd_duration]
min_time = 500
style = "bg:{{surface0}} fg:{{subtext0}}"
format = "[ 󰔛 $duration ]($style)"

[character]
success_symbol = "[❯](bold {{green}})"
error_symbol = "[❯](bold {{red}})"
