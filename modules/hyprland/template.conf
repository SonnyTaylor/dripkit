# dripkit — Hyprland theme config
# Applied by dripkit, do not edit manually

general {
    gaps_in = {{gaps_in}}
    gaps_out = {{gaps_out}}
    border_size = {{border_size}}
    col.active_border = rgba({{accent_rgb}}ff) rgba({{accent2_rgb}}ff) 45deg
    col.inactive_border = rgba({{surface0_rgb}}ff)
    layout = dwindle
}

decoration {
    active_opacity = {{active_opacity}}
    inactive_opacity = {{inactive_opacity}}
    rounding = {{rounding}}

    blur {
        enabled = true
        size = {{blur_size}}
        passes = {{blur_passes}}
        new_optimizations = true
        xray = false
    }

    shadow {
        enabled = {{shadow_enabled}}
        range = {{shadow_range}}
        render_power = 3
        color = rgba({{shadow_rgb}}ee)
    }
}

animations {
    enabled = yes
    bezier = ease, 0.25, 0.1, 0.25, 1.0
    bezier = overshot, 0.13, 0.99, 0.29, 1.1
    bezier = smooth, 0.05, 0.9, 0.1, 1.05

    animation = windowsIn, 1, 5, smooth, slide
    animation = windowsOut, 1, 4, smooth, popin 80%
    animation = windowsMove, 1, 4, smooth
    animation = border, 1, 10, default
    animation = borderangle, 1, 30, smooth, loop
    animation = fade, 1, 5, smooth
    animation = workspacesIn, 1, 5, smooth, slide
    animation = workspacesOut, 1, 5, smooth, slidefade 80%
}

group {
    col.border_active = rgba({{accent_rgb}}ff)
    col.border_inactive = rgba({{surface1_rgb}}ff)
    col.border_locked_active = rgba({{accent2_rgb}}ff)
    col.border_locked_inactive = rgba({{surface0_rgb}}ff)

    groupbar {
        font_family = "{{font}}"
        text_color = rgba({{fg_rgb}}ff)
        col.active = rgba({{accent_rgb}}ff)
        col.inactive = rgba({{surface0_rgb}}ff)
        col.locked_active = rgba({{accent2_rgb}}ff)
        col.locked_inactive = rgba({{surface0_rgb}}ff)
    }
}

misc {
    font_family = "{{font}}"
    disable_hyprland_logo = true
    background_color = rgba({{bg_rgb}}ff)
}
